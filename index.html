<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
background:#8db4c8;
font-family:Arial;
overflow:hidden;
}

.slider{
position:relative;
width:100%;
height:520px;
display:flex;
align-items:center;
justify-content:center;
}

.slide{
position:absolute;
width:65%;
height:420px;
border-radius:20px;
overflow:hidden;
box-shadow:0 20px 60px rgba(0,0,0,0.35);
transition:all 1s ease;
cursor:pointer;
}

.slide img{
width:100%;
height:100%;
object-fit:cover;
}

.center{transform:translateX(0) scale(1);z-index:5}
.right1{transform:translateX(320px) scale(.85);opacity:.8;z-index:4}
.right2{transform:translateX(580px) scale(.7);opacity:.5;z-index:3}

.left1{transform:translateX(-320px) scale(.85);opacity:.8;z-index:4}
.left2{transform:translateX(-580px) scale(.7);opacity:.5;z-index:3}

.arrow{
position:absolute;
top:50%;
transform:translateY(-50%);
font-size:40px;
color:white;
background:rgba(0,0,0,0.4);
padding:10px 18px;
cursor:pointer;
border-radius:10px;
z-index:10;
}

.arrow:hover{
background:rgba(0,0,0,0.7);
}

.left{left:20px}
.right{right:20px}

.video{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
z-index:50;
}

.video iframe{
width:80%;
height:70%;
border-radius:12px;
}

</style>
</head>

<body>

<div class="slider" id="slider">

<div class="slide" data-video="https%3A%2F%2Fwww.facebook.com%2Fnatalia.luk.ancuk.393444%2Fvideos%2F1970896183816112%2F%3Fidorvanity%3D203818461833758">
<img src="https://img.youtube.com/vi/dQw4w9WgXcQ/maxresdefault.jpg">
</div>

<div class="slide">
<img src="https://picsum.photos/id/1011/1200/700">
</div>

<div class="slide">
<img src="https://picsum.photos/id/1015/1200/700">
</div>

<div class="slide">
<img src="https://picsum.photos/id/1021/1200/700">
</div>

<div class="slide">
<img src="https://picsum.photos/id/1035/1200/700">
</div>

</div>

<div class="arrow left" onclick="prev()">❮</div>
<div class="arrow right" onclick="next()">❯</div>

<div class="video" id="video">
<iframe id="videoFrame" allowfullscreen></iframe>
</div>

<script>

let slides=document.querySelectorAll(".slide")
let index=0
let total=slides.length

function update(){

slides.forEach(s=>s.className="slide")

slides[index].classList.add("center")

slides[(index+1)%total].classList.add("right1")
slides[(index+2)%total].classList.add("right2")

slides[(index-1+total)%total].classList.add("left1")
slides[(index-2+total)%total].classList.add("left2")

}

function next(){
index++
if(index>=total)index=0
update()
}

function prev(){
index--
if(index<0)index=total-1
update()
}

let auto=setInterval(next,4000)

let slider=document.getElementById("slider")

slider.onmouseover=function(){
clearInterval(auto)
}

slider.onmouseout=function(){
auto=setInterval(next,4000)
}

slides.forEach(s=>{
s.onclick=function(){

let video=s.getAttribute("data-video")

if(video){
document.getElementById("videoFrame").src=video
document.getElementById("video").style.display="flex"
}

}
})

document.getElementById("video").onclick=function(){
this.style.display="none"
document.getElementById("videoFrame").src=""
}

update()

</script>

</body>

</html>
